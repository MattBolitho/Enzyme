name: Enzyme CI

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:
  workflow_dispatch:

jobs:
  build-linux:
    name: Enzyme CI LLVM ${{ matrix.llvm }} ${{ matrix.build }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        llvm: ["15", "16"]
        build: ["Release", "Debug"] # "RelWithDebInfo"
        os: [ubuntu-22.04]

    timeout-minutes: 30

    steps:
    - name: add llvm
      run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key|sudo apt-key add -
          sudo apt-add-repository "deb http://apt.llvm.org/`lsb_release -c | cut -f2`/ llvm-toolchain-`lsb_release -c | cut -f2`-${{ matrix.llvm }} main" || true
          sudo apt-get install --no-install-recommends -y cmake gcc g++ llvm-${{ matrix.llvm }}-dev libzstd-dev
          sudo python3 -m pip install --upgrade pip lit
    - uses: actions/checkout@v4
    - name: mkdir
      run: rm -rf build && mkdir build
    - name: cmake
      working-directory: build
      run: cmake ../enzyme -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build }} -DLLVM_EXTERNAL_LIT=`which lit` -DLLVM_DIR=/usr/lib/llvm-${{ matrix.llvm }}/lib/cmake/llvm
    - name: Build
      run: cmake --build build
    - name: Build check-typeanalysis
      run: cmake --build build --target check-typeanalysis
    - name: Build check-activityanalysis
      run: cmake --build build --target check-activityanalysis
    - name: Build check-enzyme
      run: cmake --build build --target check-enzyme-bench
    - name: graph results
      if: github.event_name != 'pull_request' && matrix.build == 'Release'
      run: python3 enzyme/test/upload-results.py build/test/Enzyme/results.json --url https://enzyme.mit.edu/cibench/api --token ${{ secrets.GRAPH_TOKEN }}

  build-macos:
    name: Enzyme CI LLVM ${{ matrix.llvm }} ${{ matrix.build }} macOS
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        llvm: ["15", "16"]
        build: ["Release", "Debug"] # "RelWithDebInfo"

    timeout-minutes: 30
    steps:
    - name: add llvm
      run: |
          brew update
          brew install llvm@${{ matrix.llvm }} make cmake
          sudo python3 -m pip install --upgrade --break-system-packages --user pip lit requests
    - uses: actions/checkout@v4
    - name: mkdir
      run: rm -rf build && mkdir build
    - name: cmake
      working-directory: build
      run: cmake ../enzyme -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build }} -DLLVM_EXTERNAL_LIT=/Users/runner/Library/Python/3.12/bin/lit -DLLVM_DIR=`brew --prefix llvm@${{ matrix.llvm }}`/lib/cmake/llvm
    - name: Build
      run: cmake --build build
    - name: Build check-typeanalysis
      run: cmake --build build --target check-typeanalysis
    - name: Build check-activityanalysis
      run: cmake --build build --target check-activityanalysis
    - name: Build check-enzyme
      run: cmake --build build --target check-enzyme-bench
    - name: graph results
      if: github.event_name != 'pull_request' && matrix.build == 'Release'
      run: python3 enzyme/test/upload-results.py build/test/Enzyme/results.json --url https://enzyme.mit.edu/cibench/api --token ${{ secrets.GRAPH_TOKEN }}

  build-xcode:
    name: Enzyme CI LLVM ${{ matrix.llvm }} ${{ matrix.build }} macOS XCode
    runs-on: macos-latest

    strategy:
      fail-fast: false
      matrix:
        llvm: ["16"]
        build: ["Release"] # "RelWithDebInfo"

    timeout-minutes: 30
    steps:
    - name: add llvm
      run: |
          brew install llvm@${{ matrix.llvm }} make cmake gcc
          sudo python3 -m pip install --upgrade --break-system-packages --user pip lit
    - uses: actions/checkout@v4
    - name: mkdir
      run: rm -rf build && mkdir build
    - name: cmake
      working-directory: build
      run: |
          cmake ../enzyme -G Xcode -DCMAKE_BUILD_TYPE=${{ matrix.build }} -DLLVM_EXTERNAL_LIT=/Users/runner/Library/Python/3.12/bin/lit -DLLVM_DIR=`brew --prefix llvm@${{ matrix.llvm }}`/lib/cmake/llvm
          cmake --build . --parallel 3
