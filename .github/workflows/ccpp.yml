name: C/C++ CI

on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
  merge_group:
  workflow_dispatch:

jobs:
  build:
    name: Integration CI LLVM ${{ matrix.llvm }} ${{ matrix.build }} ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        llvm: ["15", "16", "17", "18"]
        build: ["Release"] # "RelWithDebInfo"
        os: [ubuntu-20.04]

    timeout-minutes: 45

    steps:
    - name: add llvm
      run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key|sudo apt-key add -
          sudo apt-get install--no-install-recommends -y libmpfr-dev
          sudo apt-add-repository "deb http://apt.llvm.org/`lsb_release -c | cut -f2`/ llvm-toolchain-`lsb_release -c | cut -f2`-${{ matrix.llvm }} main" || true
          sudo apt-get install --no-install-recommends -y cmake gcc g++ llvm-${{ matrix.llvm }}-dev libomp-${{ matrix.llvm }}-dev lld-${{ matrix.llvm }} clang-${{ matrix.llvm }} libclang-${{ matrix.llvm }}-dev libeigen3-dev libboost-dev libzstd-dev
          sudo python3 -m pip install --upgrade pip lit
    - uses: actions/checkout@v4
    - name: mkdir
      run: rm -rf build && mkdir build
    - name: cmake
      working-directory: build
      run: cmake ../enzyme -G Ninja -DLLVM_EXTERNAL_LIT=`which lit` -DCMAKE_BUILD_TYPE=${{ matrix.build }} -DLLVM_DIR=/usr/lib/llvm-${{ matrix.llvm }}/lib/cmake/llvm
    - name: Build
      run: cmake --build build --targets LLVMEnzyme-${{ matrix.llvm }} ClangEnzyme-${{ matrix.llvm }} LLDEnzyme-${{ matrix.llvm }}
    - name: Build test-cmake
      run: cmake --build build --target test-cmake
    - name: Build check-enzyme-integration
      run: cmake --build build --target check-enzyme-integration
